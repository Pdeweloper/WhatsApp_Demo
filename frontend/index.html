<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WhatsApp Chatbot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <div class="app-title">
        <span class="app-logo">WA</span>
        <div>
          <h1>WhatsApp Chatbot</h1>
          <p>Simple backend simulation</p>
        </div>
      </div>
    </header>

    <main class="chat-wrapper">
      <aside class="chat-sidebar">
        <div class="user-info">
          <label for="fromUser">Your number / name</label>
          <input
            type="text"
            id="fromUser"
            placeholder="+911234567890"
            value="+911234567890"
          />
          <p class="user-hint">
            This will be sent as <code>from</code> in the API.
          </p>
        </div>

        <div class="sidebar-info">
          <h3>How to use</h3>
          <ul>
            <li>Type a message and click Send.</li>
            <li>Try <strong>Hi</strong> or <strong>Bye</strong> to see predefined replies.</li>
            <li>All messages are logged on the backend.</li>
          </ul>
        </div>
      </aside>

      <section class="chat-main">
        <div id="chatWindow" class="chat-window">
          <!-- Messages will be appended here -->
        </div>

        <div class="chat-input-bar">
          <input
            type="text"
            id="messageInput"
            placeholder="Type a message..."
          />
          <button id="sendButton">Send</button>
        </div>

        <div id="errorBox" class="error-box" style="display: none;"></div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
